name: Feeds
options:
  bundleIdPrefix: co.za.eoitech
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  SWIFT_VERSION: "6.0"
  GENERATE_INFOPLIST_FILE: true
# Note: mlx-swift-lm uses Swift macros (MLXHuggingFaceMacros). When building
# via xcodebuild CLI, pass -skipMacroValidation to avoid macro trust errors.
# Also requires Metal Toolchain: xcodebuild -downloadComponent MetalToolchain
packages:
  skip-fuse:
    url: https://source.skip.tools/skip-fuse.git
    from: "1.0.0"
  skip-fuse-ui:
    url: https://source.skip.tools/skip-fuse-ui.git
    from: "1.10.5"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "3.31.3"
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.9.0"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.0"
  skip-sql:
    url: https://source.skip.tools/skip-sql.git
    from: "0.9.0"
targets:
  Feeds:
    type: application
    platform: iOS
    sources:
      - path: Darwin/Sources
      - path: Sources/Feeds
        excludes:
          - Resources/**
      - path: Sources/Feeds/Resources
        buildPhase: resources
    dependencies:
      - package: skip-fuse
        product: SkipFuse
        embed: true
      - package: skip-fuse-ui
        product: SkipFuseUI
        embed: true
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: skip-sql
        product: SkipSQLPlus
        embed: true
    settings:
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_CFBundleDisplayName: feeds
      INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.news"
      INFOPLIST_KEY_UIStatusBarStyle: ""
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 0.1.0
      PRODUCT_BUNDLE_IDENTIFIER: co.za.eoitech.feeds
      SWIFT_STRICT_CONCURRENCY: complete
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: 53WGMXN227
  FeedsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/FeedsTests
    dependencies:
      - target: Feeds
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: co.za.eoitech.feedstests
      DEVELOPMENT_TEAM: 53WGMXN227
